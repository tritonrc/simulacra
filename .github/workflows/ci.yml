name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # Deny warnings, and drop debug info: the test binaries statically link the
  # whole workspace (wasmtime/cranelift included), and full debuginfo makes the
  # linker run out of memory on standard runners (ld "bus error").
  RUSTFLAGS: "-D warnings -C debuginfo=0"

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev
      - name: Build workspace
        run: cargo build --workspace
      # nextest runs each test in its own process (isolation) and retries
      # transient flakes (see .config/nextest.toml). This handles the
      # timing-sensitive TUI suite and SQLite "database is locked" races that
      # the default in-process runner is prone to under CI load.
      - name: Test (nextest)
        run: cargo nextest run --workspace
