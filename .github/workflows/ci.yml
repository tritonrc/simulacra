name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # Deny warnings, and drop debug info: the test binaries statically link the
  # whole workspace (wasmtime/cranelift included), and full debuginfo makes the
  # linker run out of memory on standard runners (ld "bus error").
  RUSTFLAGS: "-D warnings -C debuginfo=0"

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev
      - name: Build workspace
        run: cargo build --workspace
      # Most crates run their tests in parallel. The simulacra-cli interactive
      # TUI suite is timing-sensitive and must be serialized, so it runs on its
      # own with a single test thread.
      - name: Test (workspace, excluding CLI)
        run: cargo test --workspace --exclude simulacra-cli
      - name: Test (CLI, serialized)
        run: cargo test -p simulacra-cli -- --test-threads=1
